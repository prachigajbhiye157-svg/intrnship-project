{% extends 'base.html' %}
{% block content %}

<style>

.page-title{
font-weight:700;
}

.edit-card{
border-radius:16px;
}

.form-control{
border-radius:10px;
}

.form-control:focus{
box-shadow:0 0 0 .15rem rgba(13,110,253,.2);
}

</style>

<div class="container mt-4 mb-5">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">

<div>
<h3 class="page-title mb-0">
✏️ Edit Job
</h3>
<p class="text-muted mb-0">
Update job details carefully
</p>
</div>

<a href="{% url 'admin_jobs' %}"
class="btn btn-outline-secondary rounded-pill">

← Back to Jobs

</a>

</div>


<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card shadow-sm border-0 edit-card">

<div class="card-body p-4">

<form method="POST">

{% csrf_token %}

<!-- JOB TITLE -->

<div class="mb-3">

<label class="form-label fw-semibold">
Job Title
</label>

<input type="text"
name="title"
class="form-control form-control-lg"
value="{{ job.title }}"
placeholder="Enter job title"
required>

</div>


<!-- COMPANY -->

<div class="mb-3">

<label class="form-label fw-semibold">
Company Name
</label>

<input type="text"
name="company"
class="form-control"
value="{{ job.company }}"
placeholder="Company name"
required>

</div>


<!-- LOCATION -->

<div class="mb-3">

<label class="form-label fw-semibold">
Location
</label>

<input type="text"
name="location"
class="form-control"
value="{{ job.location }}"
placeholder="Remote / City"
required>

</div>


<!-- DESCRIPTION -->

<div class="mb-4">

<label class="form-label fw-semibold">
Job Description
</label>

<textarea name="description"
rows="5"
class="form-control"
placeholder="Describe job responsibilities"
required>{{ job.description }}</textarea>

</div>


<!-- BUTTONS -->

<div class="d-flex gap-2">

<button type="submit"
class="btn btn-success rounded-pill px-4">

💾 Update Job

</button>

<a href="{% url 'admin_jobs' %}"
class="btn btn-outline-secondary rounded-pill px-4">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
