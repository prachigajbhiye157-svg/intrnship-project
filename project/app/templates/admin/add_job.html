{% extends 'base.html' %}
{% block content %}

<style>
    .job-card {
        background: linear-gradient(135deg, #ffffff, #f8fbff);
        border-radius: 18px;
    }
    .job-header {
        background: linear-gradient(135deg, #0a66c2, #004182);
        color: white;
        border-radius: 18px 18px 0 0;
        padding: 18px;
        text-align: center;
    }
    .job-header h3 {
        margin-bottom: 0;
        font-weight: 700;
    }
    .job-header p {
        font-size: 14px;
        opacity: 0.9;
    }
    .form-control {
        border-radius: 10px;
        padding: 12px;
    }
    .form-control:focus {
        box-shadow: 0 0 0 0.15rem rgba(10,102,194,.25);
        border-color: #0a66c2;
    }
    .post-btn {
        background: #0a66c2;
        border: none;
        font-weight: 600;
        letter-spacing: 0.3px;
    }
    .post-btn:hover {
        background: #004182;
    }
</style>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card job-card shadow-lg border-0">

                <!-- HEADER -->
                <div class="job-header">
                    <h3>Post a New Job</h3>
                    <p>Admin • Job Management Panel</p>
                </div>

                <!-- BODY -->
                <div class="card-body p-4">

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Job Title</label>
                            <input type="text" name="title" class="form-control" placeholder="eg. Python Developer" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Company Name</label>
                            <input type="text" name="company" class="form-control" placeholder="eg. Google" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Location</label>
                            <input type="text" name="location" class="form-control" placeholder="Remote / City" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Job Description</label>
                            <textarea name="description" rows="4" class="form-control"
                                      placeholder="Describe job responsibilities, skills, experience…" required></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary post-btn rounded-pill py-2">
                                🚀 Post Job
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
