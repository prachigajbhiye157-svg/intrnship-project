{% extends 'base.html' %}
{% block content %}

<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height:90vh;">

<div style="width:420px;">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-4">

<!-- TITLE -->

<h3 class="text-center text-primary fw-bold mb-1">
Linked<span style="color:black;">in</span>
</h3>

<p class="text-center text-muted mb-4">
Create your professional account
</p>

<!-- ERROR MESSAGE -->

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<!-- SIGNUP FORM -->

<form method="POST" action="{% url 'signup' %}">
{% csrf_token %}

<!-- USERNAME -->

<div class="mb-3">
<label class="form-label fw-semibold">Username</label> 
<input type="text"
name="username"
class="form-control form-control-lg"
placeholder="Enter username"
required>
</div>

<!-- EMAIL -->

<div class="mb-3">
<label class="form-label fw-semibold">Email</label>
<input type="email"
name="email"
class="form-control form-control-lg"
placeholder="Enter email"
required>
</div>

<!-- PASSWORD -->

<div class="mb-3">
<label class="form-label fw-semibold">Password</label>
<input type="password"
name="password"
class="form-control form-control-lg"
placeholder="Enter password"
required>
</div>

<!-- BUTTON -->

<div class="d-grid mt-3">
<button type="submit" class="btn btn-primary btn-lg rounded-pill">
Create Account
</button>
</div>

</form>

<hr>

<p class="text-center mb-0">
Already have an account?
<a href="{% url 'login' %}" class="fw-semibold">Login</a>
</p>

</div>

</div>

</div>

</div>

{% endblock %}
