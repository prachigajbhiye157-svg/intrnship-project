{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>

/* PROFILE IMAGE */
.profile-img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

/* CARD */
.edit-card{
border-radius:16px;
}

/* INPUT */
.form-control{
border-radius:10px;
}

</style>

<div class="container mt-5" style="max-width:700px;">

<!-- HEADER -->
<div class="text-center mb-4">

{% if profile.profile_image %}
<img src="{{ profile.profile_image.url }}" class="profile-img mb-3">
{% else %}
<img src="{% static 'images/default.png' %}" class="profile-img mb-3">
{% endif %}

<h3 class="fw-bold mb-1">
Edit Profile
</h3>

<p class="text-muted">
Update your personal information
</p>

</div>


<!-- FORM CARD -->

<div class="card shadow-sm border-0 edit-card">

<div class="card-body p-4">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<!-- PROFILE IMAGE -->

<div class="mb-4">

<label class="form-label fw-semibold">
Profile Image
</label>

<input type="file"
name="profile_image"
class="form-control">

</div>


<!-- LOCATION -->

<div class="mb-3">

<label class="form-label fw-semibold">
📍 Location
</label>

<input
type="text"
name="location"
class="form-control form-control-lg"
placeholder="e.g. Bhopal, India"
value="{{ profile.location }}">

</div>


<!-- BIO -->

<div class="mb-4">

<label class="form-label fw-semibold">
🧑‍💼 Bio
</label>

<textarea
name="bio"
rows="4"
class="form-control form-control-lg"
placeholder="Tell us about yourself...">{{ profile.bio }}</textarea>

</div>


<!-- BUTTONS -->

<div class="d-flex gap-2">

<button type="submit"
class="btn btn-primary rounded-pill px-4">
Save Changes
</button>

<a href="{% url 'profile' %}"
class="btn btn-outline-secondary rounded-pill px-4">
Cancel
</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
